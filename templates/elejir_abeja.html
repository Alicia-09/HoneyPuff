{% extends "base_inicio.html" %}

{% block titulo %}Acta de Nacimiento - Abejita{% endblock %}

{% block contenido %}

<div class="container mt-4 d-flex justify-content-center">

    <div class="acta-container">

        <form method="POST">

            <img src="{{ url_for('static', filename='img/abejitaacta.jpeg') }}"
                 class="acta-img"
                 alt="Acta Abejita">

            <div class="overlay">

                <input type="text"
                       name="nombre"
                       class="input-acta input-nombre"
                       placeholder="Escribe aquí">

                <input type="text"
                       name="fecha_nacimiento"
                       class="input-acta input-fecha"
                       placeholder="DD/MM/AAAA">

                <input type="text"
                       name="lugar_nacimiento"
                       class="input-acta input-lugar"
                       placeholder="Escribe aquí">

                <input type="hidden" name="usuario_id" value="123">

            </div>

            <button type="submit" class="btn btn-primary mt-3">
                Guardar
            </button>

        </form>

    </div>

</div>

{% endblock %}
