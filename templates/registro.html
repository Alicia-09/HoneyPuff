{% extends "base_inicio.html" %}
{% block titulo %}Registrate{% endblock %}

{% block contenido %}

<link rel="stylesheet"
href="{{ url_for('static', filename='css/registro.css') }}">

 <audio autoplay loop>
        <source src="{{ url_for('static', filename='audio/menu.mp3') }}" type="audio/mp3">
    </audio>

<form method="POST"
      action="{{ url_for('registro') }}">

    <!-- nombre-->
    <input type="text"
           class="input-registro input-nombre"
           name="Nombre"
           placeholder="Nombre"
           required>

   <!-- apellido -->
    <input type="text"
           class="input-registro input-apellido"
           name="Apellido"
           placeholder="Apellido"
           required>

    <!-- correo -->
    <input type="email"
           class="input-registro input-correo"
           name="Email"
           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
           placeholder="Correo electrónico"
           required>

    <!-- contraseña -->
    <input type="password"
           class="input-registro input-password"
           name="Contra"
           placeholder="Contraseña"
           required>

    <!-- confirmar -->
    <input type="password"
           class="input-registro input-confirmar-password"
           name="ContraConfirm"
           placeholder="Confirmar contraseña"
           required>

    <!-- boton -->
    <button type="submit"
            class="boton-registro">

        <img src="{{ url_for('static', filename='img/btnregistro.png') }}">

    </button>
   
<a href="{{ url_for('login') }}"
   class="link-login">
   iniciar sesión

</a>

</form>

{% endblock %}
